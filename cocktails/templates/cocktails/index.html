{% extends 'cocktails/base.html' %}
{% block title %}Карта бара{% endblock %}
<style>
    .category-link {
            margin: 60px;
        }
</style>
{% block content %}
    <div class="categories">
        <strong>Вкусы:</strong>
        {% for taste in tastes %}
            <a href="/taste/{{ taste.pk }}" class="category-link" style="padding:10px">{{ taste }}</a>
        {% endfor %}
    </div>
    <div>
        <strong>Крепость:</strong>
        {% for al in alco %}
            <a href="/alcohol/{{ al.pk }}" class="category-link" style="padding:10px;">{{ al }}</a>
        {% endfor %}
    </div>
</section>
{% endblock %}

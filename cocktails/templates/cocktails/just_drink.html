{% extends 'cocktails/base.html' %}
{% block title %}Налей, братуха{% endblock %}

{% block content %}
<a href="{% url 'index' %}" style="color:#ffd700;">&#8592; На главную</a>
<div class="form-container">
    <h2>Выбор напитка</h2>

    <form action="{% url 'order_drink' %}" method="post">
        {% csrf_token %}

        <!-- Селектор -->
        <label for="drink">Выберите напиток:</label>
        <select name="drink" id="drink" class="custom-input">
            <option value="">-- Выберите --</option>
            {% for drink in drinks %}
                <option value="{{ drink.id }}">{{ drink.name }}</option>
            {% endfor %}
        </select>

        <!-- Поле ввода -->
        <label for="value">Объем, мл:</label>
        <input type="text" name="value" id="value"
               placeholder="Введите объем..."
               class="custom-input">

        <button type="submit" class="submit-btn">Заказать</button>
    </form>
</div>

<style>
.form-container {
    max-width: 500px;
    margin: 60px auto;
    background: #1e1e1e;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px #000;
}

.form-container h2 {
    text-align: center;
    color: #ffd700;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
}

.custom-input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #ffd700;
    background-color: #121212;
    color: #e9e9e9;
    font-size: 16px;
    transition: 0.3s;
}

.custom-input:focus {
    outline: none;
    border-color: #fff;
}

.submit-btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background-color: #ffd700;
    color: #121212;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    background-color: #fff;
}

@media (max-width: 600px) {
    .form-container {
        margin: 30px 15px;
        padding: 20px;
    }
}
</style>

{% endblock %}
